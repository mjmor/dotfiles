services:
  claude:
    build:
      context: .
      args:
        UID: "${UID}"
        GO_VERSION: "1.23.4"
    volumes:
      - "${HOME}/agent-homes/claude:/home/agent"
    networks:
      - agents-net
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.0"
    environment:
      - TS_AUTHKEY
      - ANTHROPIC_API_KEY

networks:
  agents-net:
    external: true
