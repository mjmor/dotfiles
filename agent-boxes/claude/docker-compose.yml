name: claude-code-agent

services:
  claude:
    image: claude-code-agent
    container_name: claude-code-agent
    build:
      context: .
      args:
        UID: "${UID}"
        GO_VERSION: "1.23.4"
    volumes:
      - "${HOME}/agent-homes/claude:/home/agent"
    networks:
      agents-net:
        ipv4_address: 172.18.0.2
    restart: unless-stopped
    mem_limit: 2g
    cpus: "1.0"
    environment:
      - TS_AUTHKEY
      - ANTHROPIC_API_KEY

networks:
  agents-net:
    external: true
